name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  basic-test:
    runs-on: ubuntu-latest
    env:
      CMAKE_C_COMPILER: gcc
    steps:
      - uses: actions/checkout@v2
      - name: install dependencies on ubuntu
        run: sudo ./tools/install-ubuntu-build-deps.sh
      - name: build
        run: |
          cmake -B build
          cmake --build build
      - name: run
        run: ./build/foreex
